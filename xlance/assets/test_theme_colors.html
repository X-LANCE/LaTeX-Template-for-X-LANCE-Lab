<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Color Combination Tester</title>

<style>
body{
    font-family: Arial;
    padding:30px;
    background:#fafafa;
}

h2{
    margin-bottom:10px;
}

.controls{
    display:flex;
    gap:15px;
    margin-bottom:20px;
}

.color-input{
    display:flex;
    flex-direction:column;
    font-size:12px;
}

.color-input input{
    width:90px;
    padding:4px;
}

.grid{
    display:grid;
    grid-template-columns:140px repeat(7,120px);
    gap:8px;
}

.header{
    background:#fff;
    border:1px solid #ccc;
    padding:8px;
    text-align:center;
    font-size:12px;
}

.cell{
    height:90px;
    border:1px solid #ccc;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    font-size:13px;
}

.sample{
    font-size:16px;
    font-weight:bold;
}

</style>
</head>

<body>

<h2>Text Color × Background Color Tester</h2>

<div class="controls" id="controls"></div>

<div id="board" class="grid"></div>

<script>

// let colors = [
// "#1A2175",
// "#2B37C2",
// "#3746F5",
// "#C1C5F5",
// "#E2E3F5",
// "#000000",
// "#FFFFFF"
// ]

let colors = [
"#7B1113",
"#B5192C",
"#D64855",
"#EFA0A7",
"#FDF0F1",
"#000000",
"#FFFFFF"
]

const controls = document.getElementById("controls")
const board = document.getElementById("board")

function createInputs(){

controls.innerHTML=""

colors.forEach((c,i)=>{

const div=document.createElement("div")
div.className="color-input"

const label=document.createElement("label")
label.innerText="Color "+(i+1)

const input=document.createElement("input")
input.value=c

input.addEventListener("input",()=>{
colors[i]=input.value
renderBoard()
})

div.appendChild(label)
div.appendChild(input)

controls.appendChild(div)

})

}

function renderBoard(){

board.innerHTML=""

let corner=document.createElement("div")
corner.className="header"
corner.innerText="FG / BG"
board.appendChild(corner)

colors.forEach(bg=>{
let h=document.createElement("div")
h.className="header"
h.innerText=bg
h.style.background=bg
board.appendChild(h)
})

colors.forEach(fg=>{

let rowHeader=document.createElement("div")
rowHeader.className="header"
rowHeader.innerText=fg
rowHeader.style.background=fg
board.appendChild(rowHeader)

colors.forEach(bg=>{

let cell=document.createElement("div")
cell.className="cell"
cell.style.background=bg
cell.style.color=fg

cell.innerHTML=`
<div class="sample">Aa 123</div>
<div>${fg}</div>
<div>${bg}</div>
`

board.appendChild(cell)

})

})

}

createInputs()
renderBoard()

</script>

</body>
</html>
